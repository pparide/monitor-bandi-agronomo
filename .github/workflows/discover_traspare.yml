name: Discover Traspare Sources

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run discovery script
        run: python discover_traspare_sources.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: traspare_sources
          path: traspare_valid_sources.json
